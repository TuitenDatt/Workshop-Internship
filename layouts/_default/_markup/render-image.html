{{- $src := .Destination -}}
{{- if not (or (strings.HasPrefix $src "http://") (strings.HasPrefix $src "https://") (strings.HasPrefix $src "data:") (strings.HasPrefix $src "#")) -}}
  {{- $src = $src | relURL -}}
{{- end -}}
<img src="{{ $src | safeURL }}" alt="{{ .Text }}"{{ with .Title }} title="{{ . }}"{{ end }}>
